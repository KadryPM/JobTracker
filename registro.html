<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker | Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-visual">
            <div class="brand-lockup brand-lockup--large">
                <img class="brand-logo brand-logo--large" src="assets/logo.png" alt="Logo de JobTracker">
                <span class="brand-text">JobTracker</span>
            </div>
            <div class="auth-copy">
                <p class="eyebrow">Crea tu cuenta</p>
                <h1>Empieza a organizar tu búsqueda de empleo.</h1>
                <p>Registra tus postulaciones y lleva control de cada proceso de selección de forma sencilla.</p>
            </div>
        </section>

        <!-- PANEL REGISTRO -->
        <section class="auth-panel">
            <div class="auth-card">
                <div class="section-heading">
                    <p class="eyebrow">Registro</p>
                    <h2>Crear cuenta</h2>
                    <p>Completa tus datos para comenzar.</p>
                </div>
            <form class="login-form" id="registroForm">
            <label class="field">
                <span>Nombre</span>
                <input type="text" name="nombre" placeholder="Tu nombre" required>
            </label>
            <label class="field">
                <span>Correo</span>
                <input type="email" name="email" placeholder="tu@email.com" required>
            </label>
            <label class="field">
                <span>Contraseña</span>
                <input type="password" name="password" placeholder="Crea una contraseña" required>
            </label>
            <button class="button button--primary" type="submit">
            Registrarme
            </button>
            </form>
            <p class="register-link">
            ¿Ya tienes cuenta?
            <a href="index.html">Inicia sesión</a>
            </p>
            </div>
        </section>
    </main>
<script src="app.js"></script>
</body>
</html>
