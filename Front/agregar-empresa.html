<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker | Agregar empresa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-page" id="createView">
        <section class="auth-panel">
            <div class="auth-card">
            <div class="brand-lockup auth-card__brand">
                <img class="brand-logo" src="assets/logo.png" alt="Logo de JobTracker">
                <span class="brand-text">JobTracker</span>
            </div>

            <div class="section-heading">
                <p class="eyebrow">Empresas</p>
                <h2>Nueva empresa</h2>
                <p>Agrega una compañía al directorio.</p>
            </div>

            <form class="login-form">
                <label class="field">
                <span>Nombre de la empresa</span>
                <input type="text" placeholder="Ej: Nexa Talent" required>
                </label>

                <label class="field">
                <span>Sector</span>
                <input type="text" placeholder="Ej: Tecnología" required>
                </label>

                <label class="field">
                <span>Ciudad</span>
                <input type="text" placeholder="Ej: Bogotá" required>
                </label>

                <label class="field">
                <span>Sitio web</span>
                <input type="url" placeholder="https://empresa.com" required>
                </label>

                <button class="button button--primary" type="submit">
                Guardar empresa
                </button>

                <a class="button button--secondary" href="seguimiento.html">
                Cancelar
                </a>
            </form>
            
            </div>
        </section>
    </main>

<script src="app.js"></script>
</body>
</html>
